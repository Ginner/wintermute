# sops key configuration
# See README.md § Secrets for setup instructions.
#
# Keys needed:
#   &user_ginner  — your personal age public key (~/.config/sops/age/keys.txt)
#   &host_bishop  — BISHOP's host age public key (derived from /etc/ssh/ssh_host_ed25519_key.pub)
#
# To get the host age pubkey:
#   nix-shell -p ssh-to-age --run 'cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age'
#
# To get your personal age pubkey (after generating keys.txt):
#   nix-shell -p age --run 'age-keygen -y ~/.config/sops/age/keys.txt'
#
keys:
  - &user_ginner  age1me5j9axv2zvdkdkpxh6psz7ux90qhzzxtxn7qvlrc4jjsnr8j9jq70ju0k
  - &host_bishop  age1vrup8k63y88y6jqas6tesqf47lyk2yfy3f6mk20lj6uxnxz0dadsdsawpg

creation_rules:
  - path_regex: secrets/[^/]+\.yaml$
    key_groups:
      - age:
          - *user_ginner
          - *host_bishop
